input {
  kafka {
    bootstrap_servers => "localhost:9092"
    topics => ["vm_logs"]  # Modifié pour utiliser votre topic spécifique
    codec => json
    tags => ["kafka_input", "vm_logs"]
  }
}

filter {
  # Ajout d'un identifiant de source
  mutate {
    add_field => { "log_source" => "%{host}" }
  }

  # Parsing basé sur le type de log
  if [type] == "syslog" {
    grok {
      match => { 
        "message" => [
          "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:hostname} %{DATA:service}(?:\[%{POSINT:pid}\])?: %{LOGLEVEL:log_level} %{GREEDYDATA:log_message}",
          "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:log_level} %{GREEDYDATA:log_message}"
        ]
      }
    }
    date {
      match => [ "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss", "ISO8601" ]
      target => "@timestamp"
      remove_field => ["syslog_timestamp"]
    }
  }

  # Classification avancée pour VM logs
  grok {
    match => { 
      "message" => [
        # Pour les logs système
        "%{SYSLOGTIMESTAMP:timestamp} %{WORD:vm_host} %{WORD:service}: %{LOGLEVEL:level} %{GREEDYDATA:vm_message}",
        
        # Pour les logs d'application
        "%{TIMESTAMP_ISO8601:timestamp} \[%{WORD:thread}\] %{LOGLEVEL:level} %{WORD:class} - %{GREEDYDATA:app_message}"
      ]
    }
  }

  # Normalisation des niveaux de log
  mutate {
    rename => { 
      "log_level" => "[log][level]"
      "level" => "[log][level]"
    }
    gsub => [
      "[log][level]", "ERR", "ERROR",
      "[log][level]", "WRN", "WARNING",
      "[log][level]", "INF", "INFO"
    ]
  }

  # Ajout de metadata VM
  if [hostname] =~ /vm-\d+/ {
    mutate {
      add_field => { 
        "infra_type" => "virtual_machine"
        "environment" => "%{[hostname][0,2] == 'vm' ? 'production' : 'development'}"
      }
    }
  }

  # Classification des erreurs critiques
  if [log][level] =~ /(ERROR|CRIT|FATAL)/ {
    mutate {
      add_tag => ["critical"]
      add_field => { 
        "alert_priority" => "high"
        "event_type" => "error"
      }
    }
    
    # Analyse supplémentaire des erreurs
    grok {
      match => { 
        "message" => [
          "disk full on %{PATH:disk_path}",
          "memory limit exceeded %{NUMBER:mem_usage}%",
          "connection timeout to %{IP:target_ip}"
        ]
      }
    }
  }

  # Nettoyage final
  mutate {
    remove_field => ["syslog_timestamp", "headers"]
    rename => { 
      "host" => "log_forwarder"
      "message" => "raw_message"
    }
  }
}

output {
  # Index principal pour tous les logs
  elasticsearch {
    hosts => ["localhost:9200"]
    index => "vm_logs-%{+YYYY.MM.dd}"
    document_id => "%{host}-%{[@metadata][kafka][offset]}"
  }

  # Index séparé pour les logs critiques
  if "critical" in [tags] {
    elasticsearch {
      hosts => ["localhost:9200"]
      index => "vm_critical_logs-%{+YYYY.MM.dd}"
    }
  }
}